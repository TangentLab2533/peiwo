<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站开发中 - 正切实验室</title>
    <!-- 基础样式，保证页面美观且响应式 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 4rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .logo-placeholder {
            font-size: 3rem;
            color: #4a6cf7;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #2d3748;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #4a5568;
            margin-bottom: 1.5rem;
        }

        .main-site {
            font-weight: 600;
            color: #4a6cf7;
            background-color: #f0f4ff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            display: inline-block;
            margin-top: 0.5rem;
            font-family: 'Courier New', Courier, monospace;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 图标占位（可替换为实际logo） -->
        <div class="logo-placeholder">🔧</div>
        
        <!-- 核心提示信息 -->
        <h1>网站正在开发中</h1>
        <p>我们正在全力以赴打造更好的体验，敬请期待！</p>
        <p>您可以先访问正切实验室主站：</p>
        <!-- 主站地址高亮展示 -->
        <div class="main-site">http://t.owo.vin</div>
        <br><p>也可以看看我做的豆包客服</p><div class="main-site">https://doubao.com/bot/UCTw9Nru</div>
        
        
        <!-- 页脚信息 -->
        <div class="footer">© 2026 正切实验室 保留所有权利</div>
    </div>
</body>
</html>
